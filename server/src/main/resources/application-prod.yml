spring:
  application:
    name: sudokusolver
  config:
    import: sm://
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    gcp:
      secretmanager:
        enabled: true

server:
  port: ${PORT:8080}

gemini:
  api-key: ${sm://gemini-api-key}
  model: gemini-3-flash-preview

# API Key for mobile client authentication (from Secret Manager)
sudoku:
  mobile:
    api-key: ${sm://mobile-api-key}

logging:
  level:
    root: WARN
    com.antigravity: INFO


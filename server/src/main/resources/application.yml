spring:
  application:
    name: sudokusolver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    gcp:
      secretmanager:
        enabled: false

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:your-api-key-here}
  model: gemini-3.0-flash

# App Check disabled for local dev (no token verification)
appcheck:
  enabled: false

# Path to Firebase service account key (local dev only)
# Set this to the absolute path of your downloaded JSON key file
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

---
spring:
  config:
    activate:
      on-profile: "default"
  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration
      - com.google.cloud.spring.autoconfigure.secretmanager.SecretManagerAutoConfiguration
      - com.google.cloud.spring.autoconfigure.firestore.GcpFirestoreAutoConfiguration
